# ~/.config/starship.toml
# based on: https://github.com/marcogreiveldinger/.dotfiles/blob/main/.config/starship.toml

add_newline = true
command_timeout = 1000

continuation_prompt = '[¾▒×¬](bright-black) '

format = """
$character\
[¯éÂ](#172419)$os$hostname[¯é┤ ](#172419)\
[¯éÂ](black)$directory[¯é┤ ](black)\
[¯éÂ](bright-black)$git_branch\
$git_status\
$python\
$aws\
$golang\
$java\
$nodejs\
$rust\
$ruby\
$scala\
$dart\
$conda\
$pijul_channel\
$lua\
$rlang\
$package\
$buf\
$memory_usage\
$docker_context[¯é┤ ](bright-black)\
[¯éÂ](#112338)$time[¯é┤ ](#112338)$cmd_duration
[¾▒×¬](bright-black) """

[character]
success_symbol = "[¯«│ ](#C7BB9D)"
error_symbol = "[¯Öö ](#BF6596)"

[time]
disabled = false
time_format = "%r" # Hour:Minute Format
style = "bg:#112338"
format = '[[ ¾▒æì $time ](bg:#112338 fg:#8DFBD2)]($style)'

[cmd_duration]
format = 'last command: [$duration](yellow)'

[os]
format = '[$symbol](fg:bright-yellow bg:#172419)'   
disabled = false

[memory_usage]
symbol = "¾░ìø "
disabled = true
style='dimmed fg:bright-yellow bg:bright-black'
threshold = 1
format = "[$symbol ]($style)[${ram}(|${swap})]($style)[ ]($style)"

# Shows the hostname
[hostname]
ssh_only = false
format = '[$hostname ](fg:yellow bg:#172419)'
disabled = false
ssh_symbol = "¯¼ü "

# Shows current directory
[directory]
truncation_length = 3
fish_style_pwd_dir_length=2
home_symbol = '¾░ï£ ~'
read_only_style = 'fg:197 bg:#172419'
read_only = ' ´Çú '
style = "fg:cyan bg:black"
format = '[$path]($style)[$read_only]($read_only_style)[ ]($style)'

# Shows current git branch
[git_branch]
symbol = "´Éÿ "
format = '[$symbol$branch ]($style)'
truncation_length = 10
truncation_symbol = 'ÔÇª/'
style = "fg:#001410 bg:bright-black"

# Shows current git status
[git_status]
format = '[$all_status $ahead_behind ]($style)'
style = 'fg:#001410 bg:bright-black'
conflicted = '­ƒÅ│'
up_to_date = '¯«│ '
untracked = '´ö® '
ahead = 'Ôçí${count}'
diverged = 'ÔçòÔçí${ahead_count} Ôçú${behind_count}'
behind = 'Ôçú${count}'
stashed = '´úû'
modified = '´üä '
staged = '++\($count\)'
renamed = '´¬Â'
deleted = '´Çö '

