continuation_prompt = '[ÔûÂÔûÂ ](#C7BB9D)'

[character]
success_symbol = "[¯«│ ](#C7BB9D)"
error_symbol = "[¯Öö ](#BF6596)"

[time]
disabled = false
time_format = "%r" # Hour:Minute Format
style = "bg:#112338"
format = '[[ ¾▒æı $time ](bg:#112338 fg:#8DFBD2)]($style)'

[cmd_duration]
format = 'last command: [$duration](bold yellow)'

[os]
format = '[$symbol ](bold fg:white bg:#172419)'   
disabled = false

[memory_usage]
symbol = "¾░ıø "
disabled = true
style='bold dimmed fg:white bg:#172419'
threshold = 1
format = "[$symbol ]($style)[${ram}(|${swap})]($style)[ ]($style)"

# Shows the hostname
[hostname]
ssh_only = false
format = '[on $hostname ](bold fg:yellow bg:#172419)'
disabled = false
ssh_symbol = "¯¼ü "

# Shows current directory
[directory]
truncation_length = 3
fish_style_pwd_dir_length=2
home_symbol = '¾░ï£ ~'
read_only_style = 'fg:197 bg:#172419'
read_only = ' ´Çú '
style = "bold fg:bright-cyan bg:#172419"
format = '[at $path]($style)[$read_only]($read_only_style)[ ]($style)'

# Shows current git branch
[git_branch]
symbol = "´Éİ "
format = '[via $symbol$branch]($style)'
# truncation_length = 4
truncation_symbol = 'ÔÇĞ/'
style = "bold fg:cyan bg:#172419"

# Shows current git status
[git_status]
format = '[$all_status$ahead_behind ]($style) '
style = "bold fg:cyan bg:#172419"
conflicted = '[­şÅ│]($style)'
up_to_date = ''
untracked = '[´ö® ]($style)'
ahead = '[Ôçí${count}]($style)'
diverged = '[ÔçòÔçí${ahead_count}Ôçú${behind_count}]($style)'
behind = '[Ôçú${count}]($style)'
stashed = '[´úû ]($style)'
modified = '[´üä ]($style)'
staged = '[++\($count\)](fg:green bg:#172419)'
renamed = '[´¬Â ]($style)'
deleted = '[´Çö ]($style)'

